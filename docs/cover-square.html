<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TidyDisk — Square Thumbnail (600×600)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f1f5f9;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  /* THE THUMBNAIL — exactly 600×600 */
  .thumb {
    width: 600px;
    height: 600px;
    background:
      radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.30) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(37, 99, 235, 0.35) 0%, transparent 50%),
      linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
    color: #fff;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 30px 80px rgba(15, 23, 42, 0.4);
  }

  .thumb::before {
    content: "";
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(37, 99, 235, 0.45) 0%, transparent 60%);
    top: -120px; right: -120px;
    filter: blur(40px);
    pointer-events: none;
  }

  .top-row { display: flex; align-items: center; gap: 14px; position: relative; z-index: 2; }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #2563EB, #4F46E5);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 28px; font-weight: 800;
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.5);
  }
  .brand { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .brand-sub { font-size: 12px; color: #94A3B8; font-weight: 500; }

  h1 {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.05;
    margin-top: 60px;
    z-index: 2;
    position: relative;
  }
  h1 .accent {
    background: linear-gradient(120deg, #60A5FA, #818CF8);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub {
    margin-top: 18px;
    font-size: 17px;
    color: #CBD5E1;
    font-weight: 500;
    line-height: 1.45;
    max-width: 480px;
    z-index: 2;
    position: relative;
  }

  .promises {
    margin-top: 28px;
    display: flex; flex-wrap: wrap; gap: 8px;
    z-index: 2; position: relative;
  }
  .pill {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.14);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: #E2E8F0;
  }
  .pill .check {
    color: #34D399;
    margin-right: 5px;
    font-weight: 800;
  }

  .footer-row {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 2; position: relative;
  }
  .price { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; }
  .price .currency { font-size: 22px; color: #94A3B8; vertical-align: top; margin-right: 2px; }
  .price-meta { font-size: 13px; color: #94A3B8; font-weight: 500; margin-top: 2px; }
  .price-meta strong { color: #E2E8F0; }

  .badge {
    background: rgba(52, 211, 153, 0.15);
    border: 1px solid rgba(52, 211, 153, 0.4);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    color: #6EE7B7;
    font-weight: 700;
    letter-spacing: 0.8px;
  }
  .badge .dot-live {
    width: 6px; height: 6px; border-radius: 50%;
    background: #34D399; display: inline-block; margin-right: 6px;
    box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
  }

  .size-hint {
    position: fixed; top: 12px; left: 12px;
    background: #0F172A; color: #fff;
    font-size: 12px; font-family: ui-monospace, monospace;
    padding: 8px 12px; border-radius: 6px;
  }
  @media (min-width: 800px) { .size-hint { display: none; } }
</style>
</head>
<body>

<div class="size-hint">
  Thumbnail renders at exactly 600×600.
</div>

<div class="thumb">

  <div class="top-row">
    <div class="logo">T</div>
    <div>
      <div class="brand">TidyDisk</div>
      <div class="brand-sub">for Windows · v1.0</div>
    </div>
  </div>

  <h1>Honest C-drive <span class="accent">cleaner.</span></h1>

  <p class="sub">
    No bundleware. No telemetry. No subscription. Source on GitHub.
  </p>

  <div class="promises">
    <div class="pill"><span class="check">✓</span> 12 MB</div>
    <div class="pill"><span class="check">✓</span> Zero telemetry</div>
    <div class="pill"><span class="check">✓</span> MIT source</div>
    <div class="pill"><span class="check">✓</span> Lifetime updates</div>
  </div>

  <div class="footer-row">
    <div>
      <div class="price"><span class="currency">$</span>9.99</div>
      <div class="price-meta"><strong>One-time</strong> · all your PCs</div>
    </div>
    <div class="badge"><span class="dot-live"></span>AVAILABLE NOW</div>
  </div>

</div>

</body>
</html>
